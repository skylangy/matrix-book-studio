<div class="pt-2 ps-2 pe-2 border-bottom">
  <div class="d-flex justify-content-between align-items-center ">
    <label class="">Chapters ({{chapters.length}})</label>

    <div class="d-flex justify-content-end">
      <button class="btn btn-sm" (click)="toggleSelectAll()" title="Toggle Selection">
        <i class="bi bi-check2-square"></i>
      </button>
      <button class="btn btn-sm" (click)="exportSelected()" title="Export Selected">
        <i class="bi bi-box-arrow-in-right"></i>
      </button>
    </div>
  </div>
</div>

<div class="list-group list-group-flush">
  @for (item of chapters; track item) {
    <div class="list-group-item list-group-item-action ">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" [(ngModel)]="item.isSelected" [id]="item.title">
        <label class="form-check-label" [for]="item.title">
          <span class="small">{{item.title}}</span>
        </label>
      </div>
    </div>
  }
</div>
