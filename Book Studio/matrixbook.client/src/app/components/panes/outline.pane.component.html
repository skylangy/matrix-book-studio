<div class="pt-2 ps-2 pe-2 border-bottom">
  <div class="d-flex justify-content-between align-items-center ">
    <label class="">Chapters ({{items.length}})</label>

    <div class="d-flex justify-content-end">
      <button class="btn btn-sm text-danger" (click)="showDangers()" title="Show Danger Chapters">
        <i class="bi bi-radioactive"></i>
      </button>
    </div>
  </div>
</div>


<div class="list-group list-group-flush ">
  @for (item of items; track item) {
  @if (item.tag.visible) {
  <button type="button" class="list-group-item list-group-item-action " (click)="goToLine(item)">
    <div class="d-flex justify-content-between align-items-start">
      <span class="small  {{item.tag?.titleLevel}}">{{item.match}}</span>
      <span class="text-count badge rounded-pill text-bg-secondary {{item.tag?.countLevel}}">{{item.textCount
        | number}}</span>
    </div>
  </button>
  }
  }
</div>
