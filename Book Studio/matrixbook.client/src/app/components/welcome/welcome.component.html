<div class="main-conent">
  <div class="banner" [backgroundImage]="headerImage" [gradient]="true">
    <div class="mt-3 ms-3">
      <h1>{{title}}</h1>
      <h5>{{subtitle}}</h5>
    </div>
  </div>

  <div class="d-flex justify-content-between">
    <div class="book-actions mb-2">
      @for (action of bookActions; track action) {
      <div class="">
        @if (action.visible) {
        <mtx-book-action [action]="action"></mtx-book-action>
        }
      </div>
      }
    </div>

    <div class="me-3 p-3">
      <button class="btn btn-outline-secondary" type="button" (click)="refresh()">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
  </div>


  <mtx-books title="Recent Books" [books]="books" [showFilter]="true" [(filter)]="filter" sortBy="rank" sortOrder="desc"
    thenSortBy="dateUpdated" thenOrder="desc"></mtx-books>

  @if(isLoading()) {
  <mtx-loading></mtx-loading>
  }

</div>
