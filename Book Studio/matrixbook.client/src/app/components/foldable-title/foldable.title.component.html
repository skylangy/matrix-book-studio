<div class="mb-2 border-bottom d-flex justify-content-between align-items-center">
    <div>
        <h5 class="mb-0">{{title}}</h5>
        <p class="text-muted small fw-lighter">{{subtitle}}</p>
    </div>

    @if(enableFold){
    <button class="icon-button" data-bs-toggle="collapse" attr.data-bs-target="#{{id}}" aria-expanded="false"
        attr.aria-controls="{{id}}" (click)="toggleFold()">
        <i class="bi" [ngClass]="{'bi-chevron-down': !isFolded, 'bi-chevron-up': isFolded}"></i>
    </button>
    }
</div>

<section class="collapse mb-3" [ngClass]="{'show': !isFolded}" id="{{id}}">
    <ng-content></ng-content>
</section>
