<div class="toast-container position-fixed top-0 end-0 p-2 mb-3 me-3">
    <div class="toast" [ngClass]="{'show': showToast}" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
            <strong class="me-auto text-{{notification?.type}}">{{ notification?.title }}</strong>
            <small class="text-muted">{{ notification?.time | timeAgo }}</small>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close" (click)="closeToast()">

            </button>
        </div>
        <div class="toast-body">
            {{ notification?.content }}
        </div>
    </div>
</div>
