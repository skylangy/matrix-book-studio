<div class="main-conent">
  @if(isLoading){
  <div class="center-host">
    <mtx-loading></mtx-loading>
  </div>
  } @else {
  <div>
    <mtx-header title="{{title}}" subtitle="{{subtitle}}" [background]="bannerImage"></mtx-header>

    <section class="workarea">
      <div class="d-flex justify-content-between mb-2">
        <div>
          <h3>{{title}}</h3>
        </div>

        <div class="d-flex align-items-center">
          <div class="btn-group me-2" role="group">
            <button type="button" class="btn btn-primary btn-sm" (click)="addAuthor()" title="Add new author">
              New
            </button>
          </div>
          <div class="btn-group me-2" role="group">
            <button type="button" class="btn btn-secondary btn-sm" (click)="fixAvatars()" title="Fix avatars">
              Avatar
            </button>
          </div>

          <div class="input-group">
            <input class="form-control" list="authors" id="exampleDataList" placeholder="Search..."
              [(ngModel)]="filter">
            @if (filter !== '') {
            <button class="btn btn-outline-secondary" type="button" (click)="filter = ''">
              <i class="bi bi-x"></i>
            </button>
            }
          </div>
        </div>
      </div>
    </section>

    <div class="p-3">
      <div class="authors">
        @for (author of authors?.items; track author) {
        @if (!author.hide) {
        <mtx-author [author]="author" (authorRemoved)="authorRemoved($event)" (authorEdit)="authorEdit($event)"
          (authorLoaded)="authorLoaded($event)"></mtx-author>
        }}
      </div>
    </div>
  </div>

  @if(isEditing){
  <div class="modal-backdrop fade show"></div>

  <div class="modal fade" id="authorModal" [class.show]="isEditing" tabindex="-1" aria-labelledby="authorModalLabel"
    data-bs-backdrop="static" aria-hidden="false" role="dialog">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content shadow-lg">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="globalModalLabel">{{editAuthor?.name}}</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
            (click)="authorCanceled()"></button>
        </div>

        <div class="modal-body">
          <mtx-author-editor [author]="editAuthor" [showBanner]="false" (authorSaved)="authorSaved($event)"
            (authorCanceled)="authorCanceled()"> </mtx-author-editor>
        </div>
      </div>
    </div>
  </div>
  } }
</div>
