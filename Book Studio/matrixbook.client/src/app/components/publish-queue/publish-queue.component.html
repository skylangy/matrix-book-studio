        </div>
    </div>

    <section class="workarea">

    </section>

    <div class="container-fluid">
        <div class="row">
            <div [ngClass]="{'col-12': isPublishQueueyEmpty()}" class="col">
                <div class="books" cdkDropList [cdkDropListData]="books" (cdkDropListDropped)="drop($event)">
                    @for (book of books; track book) {
                    <mtx-book [book]="book" [cardConfig]="cardConfig" cdkDrag></mtx-book>
                    }
                </div>

            </div>
