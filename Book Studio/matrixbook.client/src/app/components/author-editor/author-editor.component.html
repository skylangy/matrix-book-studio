<div class="main-conent">
    @if(showBanner){
    <mtx-header title="{{title}}" subtitle="{{subtitle}}" [background]="bannerImage"></mtx-header>
    }

    @if(author) {

    <div class="container mt-3">
        <div class="row">
            <div class="col col-md-4">
                <div class="card border-0 image-center-host">
                    <img [src]="author | authorImage" class="card-img-top rounded-circle author-avatar" alt="...">
                </div>

                <div class="card-body text-end mt-2">
                    <button class="btn btn-secondary mt-3" (click)="clearImages()">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>

                <div class="col ">
                    <label for="authorName" class="form-label">Name</label>
                    <input type="text" class="form-control" id="authorName" placeholder="Author name"
                        [(ngModel)]="author.name">
                </div>

                <div class="mt-3">
                    <label for="authorAlias" class="form-label">Alias</label>
                    <input type="text" class="form-control" id="authorAlias" placeholder="Author alias"
                        [(ngModel)]="author.alias">
                </div>
            </div>

            <div class="col col-md-8">
                <div>
                    <label for="authorDescription" class="form-label">Introduction</label>
                    <textarea class="form-control" id="authorDescription" rows="18" [(ngModel)]="author.description"
                        (paste)="prePaste($event)">
                    </textarea>
                </div>
            </div>

        </div>

        <div class="row mt-3 justify-content-end">
            <div class="col text-end">
                <button type="button" class="btn btn-primary me-2" (click)="save()">Save</button>
                <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
            </div>
        </div>
    </div>
    }
</div>
