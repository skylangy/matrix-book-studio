<div class="wizard">
  <div class="wizard-header">
    <div class=" position-relative m-4">
      <div class="progress" role="progressbar" aria-label="Progress" aria-valuenow="50" aria-valuemin="0"
        aria-valuemax="100" style="height: 1px;">
        <div class="progress-bar" style="width: 99%"></div>
      </div>

      @if (items) {
        <div class="d-flex justify-content-between steps">
          @for (item of items; track item) {
            <div>
              <div class="btn btn-secondary rounded-pill"
                [ngClass]="{'btn-primary': index >= (item.context?.index ||0)}">
                <i class="bi bi-{{item.context?.icon}}"></i>
              </div>
              <div class="step-name">
                {{item.context?.title}}
              </div>
            </div>
          }
        </div>
      }
    </div>
  </div>

  <div class="wizard-body">
    <ng-content></ng-content>
  </div>

  <div class="wizard-footer">
    <button type="button" class="btn btn-secondary me-2" (click)="goPrevious()"
    [disabled]="!canGoPrevious()">Previous</button>
    <button type="button" class="btn btn-primary" [disabled]="!canGoNext()"
    (click)="goNext()">{{nextLabel}}</button>
  </div>
</div>
