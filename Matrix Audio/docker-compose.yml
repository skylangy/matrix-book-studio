
services:
  matrixaudio:
    container_name: matrixaudio
    image: 192.168.7.1:8961/matrixaudio:latest
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - RAVENDB_URL=${RAVENDB_URL}
      - REDIS_URL=${REDIS_URL}
    volumes:
      - "${BOOKS_LOCATION}:/app/books"
    restart: always

