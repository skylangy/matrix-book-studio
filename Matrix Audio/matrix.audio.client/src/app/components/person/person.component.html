<div class="person-card no-boarder person">
    <a routerLink="/public/author/{{author?.id}}">
        <img src="{{author?.image | avatar}}" class="card-img-top rounded-circle" alt="...">
        <div class="card-body text-center">
            <h6 class="card-title text-center mt-2">{{author?.name}}</h6>
        </div>
    </a>
</div>
