<div class="login-host">
    <mtx-split-layout extra="login-container">
        <ng-container left>
            <mtx-img-pane imgUrl="/assets/images/library.jpg"></mtx-img-pane>
        </ng-container>

        <ng-container right>
            <div class="login-content">
                <section class="border-bottom mb-4">
                    <h5 class="title">{{'Forgot password' | translate}}</h5>
                    <p class="subtitle">
                        {{'Reset your password with your registered email address' | translate}}
                    </p>
                </section>

                <form [formGroup]="dataForm" novalidate (ngSubmit)="reset(dataForm.value)">
                    <div class="mb-3">
                        <label for="email" class="form-label">{{'Email address' | translate}}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" formControlName="email"
                                placeholder="your-name@email.com" required>
                        </div>
                        @if(check('email', 'required')) {
                        <div class="text-danger error">{{'Email is required.' | translate}}</div>
                        }
                    </div>

                    @if(hasOperation){
                    <div class="m-t-1">
                        <mtx-alert [header]="operation.header!" [body]="operation.body!"
                            [type]="operation.type!"></mtx-alert>
                    </div>
                    }

                    <div class="mt-2 text-end">
                        <button class="btn btn-primary shadow" type="submit" [disabled]="!dataForm.valid">{{'Reset' |
                            translate}}</button>
                    </div>
                </form>
            </div>
        </ng-container>
    </mtx-split-layout>
</div>
