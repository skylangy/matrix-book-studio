<div class="card">
    <div class="card-body">
        <h5 class="card-title">{{title}}</h5>

        <div class="text-center">
            <h1><i class="bi bi-{{icon}}"></i> {{info}}</h1>
        </div>

        <div class="text-end">
            <a [routerLink]="moreLink" class="card-link">{{moreText}}</a>
        </div>
    </div>
</div>
