<mtx-admin-container>
    <mtx-header-content header="Edit {{model?.name}}" [icon]="icon">

        @if(model){
        <form [formGroup]="dataForm" (ngSubmit)="onSubmit()" class="py-3">
            <div class="row border-bottom pb-3 mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="text-secondary">Date created: {{model.dateCreated! | date:'yyyy-MM-dd'}}</span>
                    </div>

                    <div>
                        <button type="button" class="btn btn-outline-secondary" (click)="back()">Back</button>
                        <button type="submit" class="btn btn-primary ms-2">Save</button>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col col-md-8">
                    <div class="row mb-3">
                        <div class="form-group col">
                            <label for="name" class="form-label">Name</label>
                            <input id="name" type="text" formControlName="name" class="form-control" readonly />
                        </div>

                        <div class="form-group col">
                            <label for="email" class="form-label">Email</label>
                            <input id="email" type="text" formControlName="email" class="form-control" readonly />
                        </div>
                    </div>

                    <div class="form-group mb-3">
                        <label for="bio" class="form-label">Bio</label>
                        <textarea id="bio" formControlName="bio" class="form-control" rows="6" readonly></textarea>
                    </div>

                    <div class="mt-3">
                        <mtx-admin-user-subscription [user]="model"></mtx-admin-user-subscription>
                    </div>
                </div>

                <div class="col col-md-4">
                    @if(model.imageId){
                    <div class="card mb-3">
                        <img [src]="avatar" class="img-fluid rounded" alt="avatar" />
                    </div>
                    }

                    <div class="mb-2 fs-5">Info</div>
                    <ul class="list-group">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span>Read books</span>
                            <span class="badge bg-primary rounded-pill">{{model.readBooks}}</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span>Download books</span>
                            <span class="badge bg-primary rounded-pill">{{model.readBooks}}</span>
                        </li>
                    </ul>
                </div>
            </div>
        </form>
        }

    </mtx-header-content>
</mtx-admin-container>
