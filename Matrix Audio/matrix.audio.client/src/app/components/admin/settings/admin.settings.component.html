<div class="container-fluid py-1">
    <div class="row">
        <div class="col">
            <mtx-header-content header="Settings" [icon]="icon" subHeader="Settings for the site">

                <div class="mb-2 fs-5">Settings</div>
                <ul class="list-group list-group-flush border-bottom">
                </ul>
                <div class="row mb-3 mt-3 min-size-200px">
                    <div class="col">
                        <div class="d-flex justify-content-end me-3">
                            <button type="button" class="btn btn-primary" (click)="save()">Save</button>
                        </div>
                    </div>
                </div>


                <div class="mb-2 fs-5">Actions</div>
                <ul class="list-group list-group-flush border-bottom">
                    @for (item of actions; track $index) {
                    <div class="list-group-item list-group-item-action">
                        <div class="d-flex justify-content-between">
                            <label for="languages" class="form-label mt-2">{{item.description}}</label>

                            <div>
                                <button type="button" class="btn btn-secondary btn-sm"
                                    (click)="runAction(item)">{{item.name}}</button>
                            </div>
                        </div>
                    </div>
                    }

                </ul>
            </mtx-header-content>
        </div>
    </div>

</div>
