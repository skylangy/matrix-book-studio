@if(albumCollection){
<div class="container-fluid mb-3">
    <div class="row mb-3">
        <h3 class="text-start mt-3">{{albumCollection.name}}</h3>
    </div>

    <div class="row">
        <div class="d-flex justify-content-between">
            <div class="text-body-secondary me-2">

            </div>
            <div>
                <div class="text-body-secondary album-date">{{albumCollection.dateCreated | date:'yyyy-MM-dd'}} </div>
            </div>
        </div>
    </div>
    <div class="row mt-3">
        <p class="pb-3 border-bottom">{{albumCollection.description}}</p>
    </div>

    <div class="row mt-3">
        @for (album of albumCollection.albums; track $index) {
        @defer (on viewport) {
        <mtx-album [album]="album" [cardLayout]="cardLayout"></mtx-album>
        } @placeholder {
        <div class="album-card"></div>
        }
        }
    </div>
</div>
}
