@if(isLoading){
<mtx-loading></mtx-loading>
} @else {
@switch (layout) {

@case ('card') {
<div class="category-grid">
    @for (group of groups; track $index) {
    @defer (on viewport) {
    <div class="category-card {{cardSize}}">
        <a [routerLink]="group.route">
            @defer(on viewport) {
            <img src="{{group?.image }}" class="shadow-sm" alt="{{group?.name}}">
            } @placeholder {
            <div class="img-placeholder"></div>
            }

            <div class="card-body mt-3">
                <h6 class="card-title text-center mt-2">
                    {{group?.title}}
                </h6>
            </div>
        </a>
    </div>
    } @placeholder {
    <div></div>
    } }
</div>
}
@default {
<div class="container-fluid">
    <div class="row ">
        @for (category of groups; track $index) {
        <div class="col-4 col-md-3 col-lg-2 mb-3">
            <mtx-tile-card [title]="category.title" [image]="category.image" [route]="category.route"></mtx-tile-card>
        </div>
        }
    </div>
</div>
}}
}
