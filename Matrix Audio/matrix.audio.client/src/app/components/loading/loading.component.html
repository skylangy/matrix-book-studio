@switch (style) {
@case ('book') {
<div class="loader-container-full-screen">
    <span class="loader loader-position"></span>
</div>
}
@case ('step') {
<div class="loader-container">
    <span class="loader-steps"></span>
</div>
}
@case ('spinner') {
<div class="loader-container">
    <span class="loader-spinner"></span>
</div>
}
@case ('card') {
<span class="loader-card"></span>
}
}
