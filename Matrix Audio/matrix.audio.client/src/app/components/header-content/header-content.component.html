<section class="header-content">
    <div class="d-flex justify-content-between">

        <div id="header">
            <h4 class="header">
                @if(icon){
                <i class="bi bi-{{icon}}"></i>
                }
                {{header}}
            </h4>
            @if(subHeader){
            <p class="fw-lighter">{{subHeader}}</p>
            }
        </div>

        <div id="more">
            @if(moreLinkUrl && moreLink){
            <a [routerLink]="moreLinkUrl">{{moreLink}}</a>
            }
        </div>
    </div>

    <div class="content">
        @defer (on viewport) {
        <ng-content></ng-content>
        } @placeholder {
        <div class="card">

        </div>
        }
    </div>
</section>
