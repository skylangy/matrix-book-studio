events {
    worker_connections 1024; # Maximum number of connections per worker
}

http {
    upstream webapp_backend {
        least_conn; # Distribute requests to the server with the least active connections

        # Add the IPs and ports of the Raspberry Pis hosting the web app
        # Mark server as failed after 3 failed attempts
        server 192.168.7.173:8960 max_fails=3 fail_timeout=30s; # radis
        server 192.168.7.174:8960 max_fails=3 fail_timeout=30s; # db
        server 192.168.7.175:8960 max_fails=3 fail_timeout=30s; # app
        server 192.168.7.186:8960 max_fails=3 fail_timeout=30s; # app
        server 192.168.7.205:8960 max_fails=3 fail_timeout=30s; # nginx
    }

    upstream matrixrepublic_backend {
        least_conn;

        server 192.168.7.173:8966 max_fails=3 fail_timeout=30s; # redis
        server 192.168.7.174:8966 max_fails=3 fail_timeout=30s; # db
        server 192.168.7.175:8966 max_fails=3 fail_timeout=30s; # app
        server 192.168.7.186:8966 max_fails=3 fail_timeout=30s; # app
        server 192.168.7.205:8966 max_fails=3 fail_timeout=30s; # nginx
    }

    ##
    # midnightreader.net (App on port 8960)
    ##

    server {
        server_name midnightreader.net www.midnightreader.net;
        client_max_body_size 50M;

        location / {
            proxy_pass http://webapp_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            # Add security headers
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options DENY;
            add_header X-XSS-Protection "1; mode=block";
            # error log
            error_log /var/log/nginx/proxy_error.log warn;
        }

        listen 443 ssl; # managed by Certbot
        ssl_certificate /etc/letsencrypt/live/midnightreader.net/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/midnightreader.net/privkey.pem; # managed by Certbot
        include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    }


    server {
        if ($host = www.midnightreader.net) {
            return 301 https://$host$request_uri;
        } # managed by Certbot


        if ($host = midnightreader.net) {
            return 301 https://$host$request_uri;
        } # managed by Certbot


        listen 80;
        server_name midnightreader.net www.midnightreader.net;
        return 404; # managed by Certbot
    }

    ##
    # matrixrepublic.net (App on port 8966)
    ##

    server {
        listen 443 ssl;
        server_name matrixrepublic.net www.matrixrepublic.net;

        client_max_body_size 50M;

        location / {
            proxy_pass http://matrixrepublic_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options DENY;
            add_header X-XSS-Protection "1; mode=block";

            error_log /var/log/nginx/matrixrepublic_proxy_error.log warn;
        }

        ssl_certificate /etc/letsencrypt/live/matrixrepublic.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/matrixrepublic.net/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    }

    server {
        listen 80;
        server_name matrixrepublic.net www.matrixrepublic.net;
        return 301 https://$host$request_uri;
    }
}